name: bicaralabs CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Short SHA
        id: shashort
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "SHORT_SHA=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)" >> $GITHUB_OUTPUT
          else
            echo "SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Build and push site
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            docker.io/manaira/bicaralabs:${{ steps.shashort.outputs.SHORT_SHA }}
            docker.io/manaira/bicaralabs:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-site]
    if: github.event_name != 'pull_request'
    steps:
      - name: Deploy site
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script_stop: true
          script: |
            set -e
            cd /root/bicaralabs
            docker compose pull site
            docker compose up -d --no-deps site
            docker image prune -f
